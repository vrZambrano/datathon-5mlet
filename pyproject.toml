[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["app", "src"]
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/venv/*",
    "frontend/*",
    "scripts/*",
]

[tool.coverage.report]
show_missing = true
fail_under = 80
